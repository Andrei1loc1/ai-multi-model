<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#020617" />
  <title>Offline | Multi-Model Cloud Agent</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #020617;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.10);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: rgba(103,232,249,0.18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(34,211,238,0.12), transparent 30%),
        linear-gradient(180deg, #020617, #020817 65%, #0f172a);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    }
    .card {
      width: min(100%, 720px);
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 28px;
      padding: 32px;
      backdrop-filter: blur(18px);
      box-shadow: 0 30px 90px rgba(2,6,23,0.45);
    }
    .kicker {
      margin: 0 0 12px;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(165,243,252,0.7);
    }
    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 2.6rem);
      line-height: 1.1;
      letter-spacing: -0.04em;
    }
    p {
      margin: 16px 0 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: 0.98rem;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 600;
      background: rgba(255,255,255,0.04);
    }
    a.primary {
      border-color: rgba(103,232,249,0.18);
      background: var(--accent);
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="kicker">Offline</p>
    <h1>Multi-Model Cloud Agent is installed, but the network is offline.</h1>
    <p>The cached app shell can still open pages you already visited. Live AI requests, uploads, and cloud-synced data will work again as soon as you reconnect.</p>
    <div class="actions">
      <a class="primary" href="/chat">Open Chat</a>
      <a href="/notes">Open Notes</a>
    </div>
  </main>
</body>
</html>
